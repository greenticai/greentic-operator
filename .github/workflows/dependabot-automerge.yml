name: Dependency bot auto-merge

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    if: >
      (github.event.pull_request.user.login == 'dependabot[bot]' || github.event.pull_request.user.login == 'app/dependabot' || github.event.pull_request.user.login == 'renovate[bot]' || github.event.pull_request.user.login == 'app/renovate') &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge for dependency bot PRs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;

            try {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                event: "APPROVE",
                body: "Auto-approving dependency bot PR."
              });
            } catch (error) {
              core.warning(`Skipping dependency bot auto-approval: ${error.message}`);
            }

            const mutation = `
              mutation EnableAutoMerge($pullRequestId: ID!) {
                enablePullRequestAutoMerge(input: {
                  pullRequestId: $pullRequestId,
                  mergeMethod: SQUASH
                }) {
                  pullRequest { number autoMergeRequest { enabledAt } }
                }
              }
            `;

            try {
              await github.graphql(mutation, { pullRequestId: pr.node_id });
            } catch (error) {
              core.warning(`Skipping dependency bot auto-merge: ${error.message}`);
            }
