name: Publish dev to CodeArtifact

on:
  push:
    branches: ["develop"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-dev:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: "6.x"

      - id: gitversion
        uses: gittools/actions/gitversion/execute@v3

      - uses: dtolnay/rust-toolchain@stable

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Fetch CodeArtifact token
        run: |
          TOKEN=$(aws codeartifact get-authorization-token \
            --domain ${{ secrets.CODEARTIFACT_DOMAIN }} \
            --domain-owner ${{ secrets.CODEARTIFACT_DOMAIN_OWNER }} \
            --region eu-north-1 \
            --query authorizationToken \
            --output text)
          echo "::add-mask::$TOKEN"
          echo "CARGO_REGISTRIES_CORP_ARTIFACTS_GREENTIC_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Configure Cargo registry
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml << 'EOF'
          [registries.corp-artifacts-greentic]
          index = "sparse+https://corp-artifacts-599558443099.d.codeartifact.eu-north-1.amazonaws.com/cargo/greentic/"
          credential-provider = "cargo:token"
          EOF

      - name: Apply deps-dev overlay for publish
        shell: bash
        run: |
          set -euo pipefail
          matched=0

          while IFS=$'\t' read -r DEP_NAME DEP_VERSION; do
            [[ -z "$DEP_NAME" || -z "$DEP_VERSION" ]] && continue
            matched=1
            found=0
            echo "Applying ${DEP_NAME} => ${DEP_VERSION}"

            while IFS= read -r CARGO_FILE; do
              if grep -Eq "^[[:space:]]*${DEP_NAME}[[:space:]]*=" "$CARGO_FILE"; then
                sed -i -E "s#^[[:space:]]*${DEP_NAME}[[:space:]]*=.*#${DEP_NAME} = { version = \"=${DEP_VERSION}\", registry = \"corp-artifacts-greentic\" }#" "$CARGO_FILE"
                found=1
              fi
            done < <(find . -name Cargo.toml -not -path "./target/*" -print)

            if [[ $found -eq 0 ]]; then
              echo "Dependency ${DEP_NAME} not found in Cargo.toml files; continuing"
            fi
          done < <(
            awk '
              /^[[:space:]]*[a-zA-Z0-9_-]+[[:space:]]*=/ {
                split($0, a, "=")
                name=a[1]
                gsub(/[[:space:]]/, "", name)
                if (match($0, /"[^"]+"/)) {
                  ver=substr($0, RSTART+1, RLENGTH-2)
                  print name "\t" ver
                }
              }
            ' ci/deps-dev.toml
          )

          if [[ $matched -eq 0 ]]; then
            echo "No dependencies parsed from ci/deps-dev.toml"
            cat ci/deps-dev.toml
            exit 1
          fi

      - name: Set version in Cargo.toml
        id: ver
        run: |
          VERSION="${{ steps.gitversion.outputs.majorMinorPatch }}-dev.${{ github.run_number }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          sed -i -E "s/^version\s*=\s*\".*\"/version = \"${VERSION}\"/" Cargo.toml
          echo "Publishing version: ${VERSION}"
          grep '^version\s*=\s*' Cargo.toml

      - name: Publish crate (gate)
        shell: bash
        run: |
          set -euo pipefail

          attempts=8
          delay=15
          for i in $(seq 1 "$attempts"); do
            echo "Publishing greentic-operator (attempt ${i}/${attempts})"
            set +e
            output="$(cargo publish -p greentic-operator --manifest-path Cargo.toml --registry corp-artifacts-greentic --allow-dirty 2>&1)"
            status=$?
            set -e
            echo "${output}"

            if [ "$status" -eq 0 ]; then
              break
            fi

            if echo "${output}" | grep -E -q "already uploaded|already exists|version .* is already in use|already exists on crates.io index"; then
              echo "Crate greentic-operator is already published, continuing."
              break
            fi

            if [ "$i" -lt "$attempts" ]; then
              echo "Publish failed, retrying in ${delay}s..."
              sleep "$delay"
            else
              echo "Publish failed after ${attempts} attempts."
              exit "$status"
            fi
          done

      - name: Create git tag only after successful publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.ver.outputs.version }}"
          if gh api "repos/${{ github.repository }}/git/ref/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists"
          else
            gh api "repos/${{ github.repository }}/git/refs" -X POST -f ref="refs/tags/${TAG}" -f sha="${GITHUB_SHA}"
            echo "Created tag ${TAG}"
          fi
