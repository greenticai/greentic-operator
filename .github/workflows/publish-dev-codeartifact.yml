name: Publish dev to CodeArtifact

on:
  push:
    branches: [ develop ]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.91.0
      - uses: Swatinem/rust-cache@v2
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Get CodeArtifact Token
        run: |
          token=$(aws codeartifact get-authorization-token --domain ${{ secrets.CODEARTIFACT_DOMAIN }} --domain-owner ${{ secrets.CODEARTIFACT_DOMAIN_OWNER }} --region ${{ secrets.AWS_REGION }} --query authorizationToken --output text)
          echo "::add-mask::$token"
          echo "CARGO_REGISTRIES_CORP_ARTIFACTS_GREENTIC_TOKEN=$token" >> $GITHUB_ENV
      - name: Configure CodeArtifact Registry
        run: |
          mkdir -p .cargo
          cp ci/cargo-config-dev.toml .cargo/config.toml
      - name: Apply deps-dev overlay (if present)
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f ci/deps-dev.toml ]; then
            echo "No ci/deps-dev.toml, skipping overlay"
            exit 0
          fi
          while IFS= read -r line; do
            [[ -z "${line// }" || "${line}" =~ ^[[:space:]]*# ]] && continue
            if [[ "$line" =~ ^([a-zA-Z0-9_-]+)[[:space:]]*=[[:space:]]*\"([^\"]+)\"[[:space:]]*$ ]]; then
              dep="${BASH_REMATCH[1]}"
              ver="${BASH_REMATCH[2]}"
              echo "Pinning ${dep} => ${ver}"
              sed -i -E "s#^${dep}[[:space:]]*=.*#${dep} = { version = \"=${ver}\", registry = \"corp-artifacts-greentic\" }#" Cargo.toml || true
              cargo update -p "${dep}" --precise "${ver}" || true
            fi
          done < ci/deps-dev.toml
          cargo update --workspace || true
      - name: Set dev version
        shell: bash
        run: |
          set -euo pipefail
          BASE=$(sed -nE 's/^version\s*=\s*"([^"]+)"/\1/p' Cargo.toml | head -n1)
          BASE="${BASE%%-dev.*}"
          VERSION="${BASE}-dev.${GITHUB_RUN_NUMBER}"
          sed -i -E "0,/^version\s*=\s*\"[^\"]+\"/s//version = \"${VERSION}\"/" Cargo.toml
          echo "DEV_VERSION=${VERSION}" >> $GITHUB_ENV
      - name: Publish crates to CodeArtifact
        shell: bash
        run: |
          set -euo pipefail
          for crate in greentic-operator; do
            echo "Publishing ${crate}"
            set +e
            output=$(cargo publish -p "${crate}" --registry corp-artifacts-greentic --allow-dirty 2>&1)
            status=$?
            set -e
            echo "$output"
            if [ "$status" -ne 0 ]; then
              if echo "$output" | grep -E -q "already uploaded|already exists|version .* is already in use|already exists on crates.io index"; then
                echo "${crate} already published, continue"
              else
                echo "Publish failed for ${crate}" >&2
                exit "$status"
              fi
            fi
            sleep 5
          done
      - name: Create git tag after successful publish
        run: |
          set -euo pipefail
          TAG="${DEV_VERSION}"
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "${TAG}"
            git push origin "${TAG}"
          fi
